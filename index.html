<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;

    background: linear-gradient(135deg,#ffd6ec,#ffe6f7,#fff0f5);
    overflow-x:hidden;
}

/* Title */
h1 {
    text-align:center;
    font-family:'Pacifico', cursive;
    color:#ff3399;
    font-size:40px;
    text-shadow: 2px 2px 10px rgba(255,0,150,0.3);
}

/* Section */
.year {
    margin:30px;
    padding:25px;
    background: rgba(255,255,255,0.8);
    border-radius:30px;

    box-shadow:0 10px 30px rgba(255,105,180,0.3);
}

/* Special Photo */
.special {
    text-align:center;
    margin-bottom:20px;
}

.special img {
    width:220px;
    border-radius:25px;
    border:6px solid pink;
    box-shadow: 0 10px 30px rgba(255,0,150,0.5);
}

.special p {
    margin-top:10px;
}

/* Gallery */
.gallery {
    column-count:4;
    column-gap:10px;
}

.gallery img {
    width:100%;
    margin-bottom:12px;
    border-radius:20px;

    /* Beautiful frame */
    border:5px solid #fff;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);

    /* soft glow */
    transition: all 0.4s ease;
    background: linear-gradient(45deg,#ffd6ec,#ffe6f7);
    padding:5px;
}

.gallery img:hover {
    transform: scale(1.08) rotate(1deg);
    box-shadow: 0 15px 35px rgba(255, 0, 150, 0.6);
}

/* Popup */
.popup {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup img {
    max-width:90%;
    max-height:90%;
    border-radius:20px;
}

/* Music Button */
.music-btn {
    display:block;
    margin:25px auto;
    padding:15px 30px;

    background: linear-gradient(45deg,#ff4da6,#ff99cc);
    color:white;

    border:none;
    border-radius:50px;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(255,0,150,0.5);

    transition: all 0.3s ease;
}

/* Hover */
.music-btn:hover {
    transform: scale(1.1);
    box-shadow:0 12px 30px rgba(255,0,150,0.7);
}

/* Click animation */
.music-btn:active {
    transform: scale(0.95);
}

/* Floating Hearts */
.heart {
    position:fixed;
    bottom:-10px;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform:translateY(0);}
    100% {transform:translateY(-100vh);}
}

/* Cute floating emojis */
.cute {
    position:fixed;
    font-size:25px;
    animation: move 10s linear infinite;
}

@keyframes move {
    0% {transform:translateX(-10vw);}
    100% {transform:translateX(110vw);}
}
</style>
</head>

<body>

<h1>Happy Birthday My Love 💖</h1>

<button class="music-btn" onclick="playMusic()">🎵 Play Our Song</button>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
<img id="popupImg">
</div>

<script>
function playMusic(){
    document.getElementById("music").play();
}

/* Popup */
function openPopup(img){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src=img.src;
}

setInterval(function(){
    let spark=document.createElement("div");
    spark.innerHTML="✨";
    spark.style.position="fixed";
    spark.style.left=Math.random()*100+"vw";
    spark.style.top=Math.random()*100+"vh";
    spark.style.fontSize="15px";

    document.body.appendChild(spark);

    setTimeout(()=>spark.remove(),2000);
},300);

/* Hearts */
setInterval(function(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
},400);

/* Cute moving emojis */
setInterval(function(){
    let cute=document.createElement("div");
    cute.className="cute";
    cute.innerHTML="🐻💖";
    cute.style.top=Math.random()*100+"vh";
    document.body.appendChild(cute);
    setTimeout(()=>cute.remove(),10000);
},2000);
</script>
